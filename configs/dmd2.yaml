# M4 DMD2 Stage B configuration.
seed: 0
device: auto   # auto -> cuda if available, else cpu

teacher_checkpoint: outputs/m1/teacher.pt
# Start from the best M3 student/mu_fake (dmd_no_reg_ttur, fake_updates=3).
m3_student_checkpoint: outputs/m3/dmd_no_reg_ttur/student.pt
m3_fake_checkpoint: outputs/m3/dmd_no_reg_ttur/mu_fake.pt   # null -> init mu_fake from EMA teacher

output_dir: outputs/m4
eval_noise: outputs/eval_noise.pt   # shared fixed x_T (same as M2/M3)

# Diffusion schedule (must match the teacher).
diffusion:
  num_timesteps: 200
  beta_start: 1.0e-4
  beta_end: 0.02

t_gen: null        # one-step generation timestep; null -> num_timesteps - 1
t_min_frac: 0.02   # DMD matching timestep range (same as best M3)
t_max_frac: 0.98

# GAN noising timestep range, separate from the DMD score range above. Restricted
# to low/mid noise so the discriminator gets a usable real-vs-fake signal (at high
# noise both are ~N(0,I) and indistinguishable). 0.0-0.7 selected by the M4.1 sweep.
gan_t_min_frac: 0.0
gan_t_max_frac: 0.7

train_steps: 3000
batch_size: 512
gen_lr: 1.0e-4
fake_lr: 1.0e-3
disc_lr: 3.0e-4    # M4.1-tuned (was 1.0e-4)
log_every: 100

# DMD2: keep TTUR from the best M3, drop regression, add GAN.
# The discriminator is a linear head on mu_fake's shared last hidden layer (no
# separate network, no separate time embedding); disc_lr drives the joint
# head + mu_fake update.
fake_updates_per_gen: 3
disc_updates_per_gen: 1
lambda_gan: 0.05   # M4.1-tuned (was 0.1)

eval:
  n_samples: 2000
