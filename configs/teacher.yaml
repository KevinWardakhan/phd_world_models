# M1 DDPM teacher configuration.
seed: 0
device: auto   # auto -> cuda if available, else cpu

# Target pi_1 (must match configs/data.yaml geometry).
data:
  side: 1.0
  gap: 0.0

diffusion:
  num_timesteps: 200
  beta_start: 1.0e-4
  beta_end: 0.02

model:
  hidden_dim: 128
  n_layers: 4
  time_embed_dim: 64

train:
  steps: 20000
  batch_size: 512
  lr: 2.0e-3
  log_every: 200

ema:
  enabled: true
  decay: 0.999
  start_step: 0

eval:
  n_samples: 2000

gif:
  n_points: 1500
  n_frames: 60
  fps: 15

output_dir: outputs/m1
checkpoint: outputs/m1/teacher.pt
load_if_exists: false   # set true to reuse an existing checkpoint instead of retraining
