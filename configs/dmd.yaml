# M3 DMD Stage A configuration.
seed: 0
device: auto   # auto -> cuda if available, else cpu

teacher_checkpoint: outputs/m1/teacher.pt
output_dir: outputs/m3
eval_noise: outputs/eval_noise.pt   # shared fixed x_T (same as M2)

# Diffusion schedule (must match the teacher).
diffusion:
  num_timesteps: 200
  beta_start: 1.0e-4
  beta_end: 0.02

t_gen: null        # one-step generation timestep; null -> num_timesteps - 1
t_min_frac: 0.02   # DMD samples the matching timestep in [0.02T, 0.98T]
t_max_frac: 0.98

train_steps: 3000
batch_size: 512
gen_lr: 1.0e-4   # M3.1 sweep: best (unchanged)
fake_lr: 1.0e-3  # M3.1 sweep: best (unchanged)
log_every: 100

# M3.1 sweep picked smooth_l1 at lambda=0.05 as the best regression setting
# (much better than the original mse/0.25).
lambda_reg: 0.05
reg_loss_type: smooth_l1   # mse | smooth_l1 | l1
reg:
  n_pairs: 2000
  path: outputs/m3/reg_pairs.pt
  det_sampler: ddim_eta0

eval:
  n_samples: 2000

# Ablation: regression on/off and TTUR (fake updates per generator update).
# Hyperparameters below were selected by the M3.1 sweep (see README "M3.1").
# Headline: the naive no-reg/fu=1 config is the WEAKEST; both regression and
# TTUR clearly help, and TTUR (fake_updates_per_gen=3, no reg) is the best.
variants:
  - name: dmd_no_reg            # naive distribution matching (now the weakest)
    lambda_reg: 0.0
    fake_updates_per_gen: 1
  - name: dmd_reg              # regression stabilizer (smooth_l1, lambda=0.05)
    lambda_reg: 0.05
    fake_updates_per_gen: 1
  - name: dmd_no_reg_ttur      # best: TTUR fake_updates=3, no regression
    lambda_reg: 0.0
    fake_updates_per_gen: 3
