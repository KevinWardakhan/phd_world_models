# M3 DMD Stage A configuration.
seed: 0
device: auto   # auto -> cuda if available, else cpu

teacher_checkpoint: outputs/m1/teacher.pt
output_dir: outputs/m3
eval_noise: outputs/eval_noise.pt   # shared fixed x_T (same as M2)

# Diffusion schedule (must match the teacher).
diffusion:
  num_timesteps: 200
  beta_start: 1.0e-4
  beta_end: 0.02

t_gen: null        # one-step generation timestep; null -> num_timesteps - 1
t_min_frac: 0.02   # DMD samples the matching timestep in [0.02T, 0.98T]
t_max_frac: 0.98

train_steps: 3000
batch_size: 512
gen_lr: 1.0e-4 # to tune ?
fake_lr: 1.0e-3 # to tune ?
log_every: 100

lambda_reg: 0.25       # DMD default; overridden per variant, to tune ?
reg_loss_type: mse     # mse | smooth_l1 | l1, to tune ?
reg:
  n_pairs: 2000
  path: outputs/m3/reg_pairs.pt
  det_sampler: ddim_eta0

eval:
  n_samples: 2000

# Ablation: regression on/off and TTUR (fake updates per generator update).
variants:
  - name: dmd_reg
    lambda_reg: 0.25
    fake_updates_per_gen: 1
  - name: dmd_no_reg
    lambda_reg: 0.0
    fake_updates_per_gen: 1
  - name: dmd_no_reg_ttur
    lambda_reg: 0.0
    fake_updates_per_gen: 5
